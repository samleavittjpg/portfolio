<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#000"/>
  <!-- pixel skull -->
  <!-- row 1 -->
  <rect x="5" y="1" width="6" height="1" fill="#fff"/>
  <!-- row 2 -->
  <rect x="4" y="2" width="8" height="1" fill="#fff"/>
  <!-- row 3 -->
  <rect x="3" y="3" width="10" height="1" fill="#fff"/>
  <!-- row 4 -->
  <rect x="3" y="4" width="10" height="1" fill="#fff"/>
  <!-- row 5 -->
  <rect x="3" y="5" width="10" height="1" fill="#fff"/>
  <!-- row 6 (eyes) -->
  <rect x="3" y="6" width="10" height="1" fill="#fff"/>
  <rect x="5" y="6" width="2" height="2" fill="#000"/>
  <rect x="9" y="6" width="2" height="2" fill="#000"/>
  <!-- row 7 -->
  <rect x="3" y="7" width="10" height="1" fill="#fff"/>
  <!-- row 8 (nose) -->
  <rect x="3" y="8" width="10" height="1" fill="#fff"/>
  <rect x="7" y="8" width="2" height="2" fill="#000"/>
  <!-- row 9 -->
  <rect x="3" y="9" width="10" height="1" fill="#fff"/>
  <!-- jaw -->
  <rect x="4" y="10" width="8" height="1" fill="#fff"/>
  <rect x="4" y="11" width="8" height="1" fill="#fff"/>
  <!-- teeth -->
  <rect x="6" y="11" width="1" height="1" fill="#000"/>
  <rect x="8" y="11" width="1" height="1" fill="#000"/>
  <rect x="10" y="11" width="1" height="1" fill="#000"/>
  <rect x="5" y="11" width="1" height="1" fill="#000"/>
  <!-- chin -->
  <rect x="5" y="12" width="6" height="1" fill="#fff"/>
  <rect x="6" y="13" width="4" height="1" fill="#fff"/>
</svg>

